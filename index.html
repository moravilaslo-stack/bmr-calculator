<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMR ATELIER</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #111, #1a1a1a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* 🔥 Анімація BMW M */
@keyframes bmwGradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.bmw-gradient-text {
    background: linear-gradient(90deg, #5BC2E7, #1C69D4, #E10600);
    background-size: 300% 300%;
    animation: bmwGradientFlow 6s ease infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.bmw-gradient-bg {
    background: linear-gradient(90deg, #5BC2E7, #1C69D4, #E10600);
    background-size: 300% 300%;
    animation: bmwGradientFlow 6s ease infinite;
}

.card {
    background: rgba(15, 15, 15, 0.95);
    padding: 30px;
    border-radius: 20px;
    width: 400px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 800;
    letter-spacing: 2px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover { 
    transform: scale(1.05); 
}

input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

.service {
    display: flex;
    align-items: center;
    margin: 10px 0;
}

.service input[type="checkbox"] { display: none; }

.custom-checkbox {
    width: 22px;
    height: 22px;
    border: 2px solid #1C69D4;
    border-radius: 6px;
    margin-right: 10px;
    position: relative;
    cursor: pointer;
}

.service input[type="checkbox"]:checked + .custom-checkbox {
    background: linear-gradient(45deg, #5BC2E7, #1C69D4, #E10600);
    border: none;
}

.service input[type="checkbox"]:checked + .custom-checkbox::after {
    content: "✔";
    position: absolute;
    top: -2px;
    left: 4px;
    color: white;
    font-size: 16px;
}

.total {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.receipt {
    background: #111;
    padding: 25px;
    border-radius: 15px;
    width: 340px;
    box-shadow: 0 0 25px rgba(28,105,212,0.5);
    color: white;
}

.receipt h3 {
    text-align: center;
}

.receipt-item {
    display: flex;
    justify-content: space-between;
    margin: 6px 0;
    font-size: 14px;
}

.receipt-total {
    border-top: 1px solid #333;
    margin-top: 10px;
    padding-top: 10px;
    font-weight: bold;
    color: #5BC2E7;
}

.close-btn { background: #222; margin-top:8px; }
.hidden { display: none; }

</style>
</head>

<body>
<div class="card">

<!-- Сторінка 1 -->
<div id="page1">
<h2 class="bmw-gradient-text">BMR ATELIER</h2>

<label>Оберіть автомобіль:</label>
<select id="carSelect"></select>

<h3 style="margin-top:15px;color:#aaa;">Додати новий автомобіль</h3>
<input type="text" id="newCarNumber" placeholder="Номер авто">
<input type="text" id="newCarVin" placeholder="VIN (не обов'язково)">
<input type="text" id="newCarModel" placeholder="Модель авто">
<button class="bmw-gradient-bg" onclick="addCar()">Додати автомобіль</button>

<button class="bmw-gradient-bg" style="margin-top:20px;" onclick="goToPage2()">Далі → Вибір послуг</button>
</div>

<!-- Сторінка 2 -->
<div id="page2" class="hidden">
<h2 class="bmw-gradient-text">BMR ATELIER</h2>
<div id="services"></div>
<button class="bmw-gradient-bg" onclick="generateReceipt()">Згенерувати чек</button>
<div class="total bmw-gradient-text" id="total">Загальна сума: 0 грн</div>

<h3 style="margin-top:20px;color:#ccc;">Додати власну послугу</h3>
<input type="text" id="customName" placeholder="Назва послуги">
<input type="number" id="customPrice" placeholder="Ціна">
<button class="bmw-gradient-bg" onclick="addService()">Додати послугу</button>
<button style="margin-top:20px;" onclick="goToPage1()">← Назад до авто</button>
</div>

<!-- Модальне вікно -->
<div class="modal" id="modal">
    <div class="receipt">
        <h3 class="bmw-gradient-text">BMR ATELIER</h3>
        <div id="receiptCar"></div>
        <div id="receiptItems"></div>
        <div class="receipt-total" id="receiptTotal"></div>
        <div id="receiptDate" style="margin-top:8px;font-size:12px;color:#aaa;"></div>
        <button class="bmw-gradient-bg" onclick="window.print()">Завантажити / Друк</button>
        <button class="close-btn" onclick="closeModal()">Закрити</button>
    </div>
</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars")) || [];
const carSelect = document.getElementById("carSelect");

function renderCars() {
    carSelect.innerHTML = "";
    cars.forEach((car, i) => {
        carSelect.innerHTML += `<option value="${i}">${car.number} ${car.model ? '- ' + car.model : ''} ${car.vin ? '- ' + car.vin : ''}</option>`;
    });
}
renderCars();

function addCar() {
    const number = document.getElementById("newCarNumber").value.trim();
    const vin = document.getElementById("newCarVin").value.trim();
    const model = document.getElementById("newCarModel").value.trim();
    if (!number || !model) { alert("Введіть номер і модель авто!"); return; }
    cars.push({ number, vin, model });
    localStorage.setItem("cars", JSON.stringify(cars));
    renderCars();
    document.getElementById("newCarNumber").value = "";
    document.getElementById("newCarVin").value = "";
    document.getElementById("newCarModel").value = "";
}

function goToPage2() {
    if (cars.length === 0) { alert("Додайте автомобіль!"); return; }
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
}
function goToPage1() {
    document.getElementById("page2").classList.add("hidden");
    document.getElementById("page1").classList.remove("hidden");
}

let services = {
    "Заміна масла": 800,
    "Заміна гальмівних колодок": 1200,
    "Діагностика двигуна": 1500,
    "Заміна фільтрів": 600,
    "Розвал-сходження": 1000
};

function renderServices() {
    const container = document.getElementById("services");
    container.innerHTML = "";
    for (let service in services) {
        container.innerHTML += `
        <label class="service">
            <input type="checkbox" value="${services[service]}" onchange="updateTotal()">
            <span class="custom-checkbox"></span>
            ${service} - ${services[service]} грн
        </label>`;
    }
}
renderServices();

function updateTotal() {
    let total = 0;
    document.querySelectorAll("input[type=checkbox]:checked")
        .forEach(el => total += Number(el.value));
    document.getElementById("total").innerText = "Загальна сума: " + total + " грн";
}

function generateReceipt() {
    const car = cars[carSelect.value];
    let total = 0;
    const itemsContainer = document.getElementById("receiptItems");
    itemsContainer.innerHTML = "";
    document.querySelectorAll("input[type=checkbox]:checked").forEach(el => {
        const label = el.parentElement.innerText;
        const price = Number(el.value);
        total += price;
        itemsContainer.innerHTML += `<div class="receipt-item"><span>${label}</span></div>`;
    });
    document.getElementById("receiptCar").innerHTML =
        `<div class="receipt-item"><strong>Авто:</strong> ${car.number} - ${car.model} ${car.vin ? '- VIN: ' + car.vin : ''}</div>`;
    document.getElementById("receiptTotal").innerText = "Разом: " + total + " грн";
    document.getElementById("receiptDate").innerText = "Дата: " + new Date().toLocaleString();
    document.getElementById("modal").style.display = "flex";
}

function closeModal() { 
    document.getElementById("modal").style.display = "none"; 
}

function addService() {
    const name = document.getElementById("customName").value.trim();
    const price = Number(document.getElementById("customPrice").value);
    if (!name || !price) { alert("Введіть правильні дані!"); return; }
    services[name] = price;
    renderServices();
    updateTotal();
    document.getElementById("customName").value = "";
    document.getElementById("customPrice").value = "";
}
</script>
</body>
</html>
