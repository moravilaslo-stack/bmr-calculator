<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMR ATELIER</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #111, #1a1a1a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* 🔥 Анімація */
@keyframes bmwMoveRight {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* Кнопка історії */
.history-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 9999;
    padding: 10px 18px;
    border-radius: 30px;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 4s linear infinite;
}

.card {
    background: rgba(15, 15, 15, 0.95);
    padding: 30px;
    border-radius: 20px;
    width: 400px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    color: white;
}

h2 {
    text-align: center;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 6s linear infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 4s linear infinite;
}

.hidden { display: none; }

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.history-box {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    width: 350px;
    max-height: 80vh;
    overflow-y: auto;
    color: white;
}
.history-entry {
    border-bottom: 1px solid #333;
    padding: 8px 0;
    font-size: 13px;
}
</style>
</head>

<body>

<button class="history-btn" onclick="openHistory()">Історія авто</button>

<div class="card">
<div id="page1">
<h2>BMR ATELIER</h2>

<label>Оберіть автомобіль:</label>
<select id="carSelect"></select>

<h3>Додати новий автомобіль</h3>
<input type="text" id="newCarNumber" placeholder="Номер авто">
<input type="text" id="newCarModel" placeholder="Модель авто">
<button onclick="addCar()">Додати авто</button>
<button onclick="goToPage2()">Далі</button>
</div>

<div id="page2" class="hidden">
<h2>BMR ATELIER</h2>
<div id="services"></div>
<button onclick="saveService()">Зберегти послуги</button>
<button onclick="goToPage1()">← Назад</button>
</div>
</div>

<!-- Модальне вікно історії -->
<div class="modal" id="historyModal">
<div class="history-box">
<h3>Історія обслуговування</h3>
<div id="historyContent"></div>
<button onclick="closeHistory()">Закрити</button>
</div>
</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars")) || [];
const carSelect = document.getElementById("carSelect");

function saveData() {
    localStorage.setItem("cars", JSON.stringify(cars));
}

function renderCars() {
    carSelect.innerHTML = "";
    cars.forEach((car,i)=>{
        if(!car.history) car.history=[];
        carSelect.innerHTML += `<option value="${i}">${car.number} - ${car.model}</option>`;
    });
}
renderCars();

function addCar(){
    const number=newCarNumber.value.trim();
    const model=newCarModel.value.trim();
    if(!number||!model) return alert("Введіть номер і модель!");
    cars.push({number,model,history:[]});
    saveData();
    renderCars();
    newCarNumber.value="";
    newCarModel.value="";
}

function goToPage2(){
    if(cars.length===0) return alert("Додайте авто!");
    page1.classList.add("hidden");
    page2.classList.remove("hidden");
}

function goToPage1(){
    page2.classList.add("hidden");
    page1.classList.remove("hidden");
}

let services={
    "Заміна масла":800,
    "Гальмівні колодки":1200,
    "Діагностика":1500
};

function renderServices(){
    services.innerHTML="";
    const container=document.getElementById("services");
    container.innerHTML="";
    for(let s in services){
        container.innerHTML+=`
        <label>
        <input type="checkbox" value="${s}"> ${s}
        </label><br>`;
    }
}
renderServices();

function saveService(){
    const car=cars[carSelect.value];
    if(!car) return alert("Оберіть авто");
    let selected=[];
    document.querySelectorAll("#services input:checked")
    .forEach(el=>selected.push(el.value));
    if(selected.length===0) return alert("Оберіть послуги!");
    car.history.push({
        date:new Date().toLocaleString(),
        services:selected
    });
    saveData();
    alert("Додано в історію!");
}

function openHistory(){
    const car=cars[carSelect.value];
    if(!car) return alert("Оберіть авто!");
    historyContent.innerHTML="";
    if(car.history.length===0){
        historyContent.innerHTML="Історія пуста";
    } else {
        car.history.forEach(h=>{
            historyContent.innerHTML+=`
            <div class="history-entry">
            <strong>${h.date}</strong><br>
            ${h.services.join("<br>")}
            </div>`;
        });
    }
    historyModal.style.display="flex";
}

function closeHistory(){
    historyModal.style.display="none";
}
</script>

</body>
</html>
