<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMR ATELIER</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #111, #1a1a1a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

@keyframes bmwMoveRight {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

.card {
    background: rgba(15, 15, 15, 0.95);
    padding: 30px;
    border-radius: 20px;
    width: 400px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 6s linear infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.3s;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 4s linear infinite;
}

button:hover { transform: scale(1.05); }

input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

.service {
    display: flex;
    align-items: center;
    margin: 10px 0;
}

.service input[type="checkbox"] { display: none; }

.custom-checkbox {
    width: 22px;
    height: 22px;
    border: 2px solid #1C69D4;
    border-radius: 6px;
    margin-right: 10px;
    position: relative;
    cursor: pointer;
}

.service input[type="checkbox"]:checked + .custom-checkbox {
    background: linear-gradient(45deg,#5BC2E7,#1C69D4,#E10600);
    border: none;
}

.service input[type="checkbox"]:checked + .custom-checkbox::after {
    content: "✔";
    position: absolute;
    top: -2px;
    left: 4px;
    color: white;
    font-size: 16px;
}

.total {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 6s linear infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.receipt {
    background: #111;
    padding: 25px;
    border-radius: 15px;
    width: 340px;
    box-shadow: 0 0 25px rgba(28,105,212,0.5);
    color: white;
    max-height: 80vh;
    overflow-y: auto;
}

.receipt-item {
    display: flex;
    justify-content: space-between;
    margin: 6px 0;
    font-size: 14px;
}

.receipt-total {
    border-top: 1px solid #333;
    margin-top: 10px;
    padding-top: 10px;
    font-weight: bold;
    color: #5BC2E7;
}

.hidden { display: none; }

.history-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    width: auto;
    padding: 10px 18px;
    border-radius: 25px;
}
</style>
</head>

<body>

<button class="history-btn" onclick="openHistory()">Історія авто</button>

<div class="card">

<div id="page1">
<h2>BMR ATELIER</h2>
<label>Оберіть автомобіль:</label>
<select id="carSelect"></select>

<h3 style="margin-top:15px;color:#aaa;">Додати новий автомобіль</h3>
<input type="text" id="newCarNumber" placeholder="Номер авто">
<input type="text" id="newCarVin" placeholder="VIN (не обов'язково)">
<input type="text" id="newCarModel" placeholder="Модель авто">
<button onclick="addCar()">Додати автомобіль</button>
<button style="margin-top:20px;" onclick="goToPage2()">Далі → Вибір послуг</button>
</div>

<div id="page2" class="hidden">
<h2>BMR ATELIER</h2>
<div id="services"></div>
<button onclick="generateReceipt()">Згенерувати чек</button>
<div class="total" id="total">Загальна сума: 0 грн</div>
<button style="margin-top:20px;" onclick="goToPage1()">← Назад до авто</button>
</div>

</div>

<!-- ЧЕК -->
<div class="modal" id="receiptModal">
    <div class="receipt">
        <h3>BMR ATELIER</h3>
        <div id="receiptCar"></div>
        <div id="receiptItems"></div>
        <div class="receipt-total" id="receiptTotal"></div>
        <div id="receiptDate" style="margin-top:8px;font-size:12px;color:#aaa;"></div>
        <button onclick="window.print()">Друк / PDF</button>
        <button onclick="closeReceipt()">Закрити</button>
    </div>
</div>

<!-- ІСТОРІЯ -->
<div class="modal" id="historyModal">
    <div class="receipt">
        <h3>Історія авто</h3>
        <select id="historyCarSelect" onchange="renderHistory()"></select>
        <div id="historyContent" style="margin-top:15px;"></div>
        <button onclick="closeHistory()">Закрити</button>
    </div>
</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars")) || [];
const carSelect = document.getElementById("carSelect");

function saveCars(){ localStorage.setItem("cars", JSON.stringify(cars)); }

function renderCars(){
    carSelect.innerHTML="";
    cars.forEach((car,i)=>{
        if(!car.history) car.history=[];
        carSelect.innerHTML+=`<option value="${i}">
        ${car.number} ${car.model?'- '+car.model:''}
        </option>`;
    });
}
renderCars();

function addCar(){
    const number=newCarNumber.value.trim();
    const vin=newCarVin.value.trim();
    const model=newCarModel.value.trim();
    if(!number||!model) return;
    cars.push({number,vin,model,history:[]});
    saveCars();
    renderCars();
    newCarNumber.value="";
    newCarVin.value="";
    newCarModel.value="";
}

function goToPage2(){
    if(cars.length===0) return;
    page1.classList.add("hidden");
    page2.classList.remove("hidden");
}
function goToPage1(){
    page2.classList.add("hidden");
    page1.classList.remove("hidden");
}

let services={
    "Заміна масла":800,
    "Заміна гальмівних колодок":1200,
    "Діагностика двигуна":1500,
    "Заміна фільтрів":600,
    "Розвал-сходження":1000
};

function renderServices(){
    const container=document.getElementById("services");
    container.innerHTML="";
    for(let s in services){
        container.innerHTML+=`
        <label class="service">
            <input type="checkbox" value="${services[s]}" data-name="${s}" onchange="updateTotal()">
            <span class="custom-checkbox"></span>
            ${s} - ${services[s]} грн
        </label>`;
    }
}
renderServices();

function updateTotal(){
    let total=0;
    document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(el=>total+=Number(el.value));
    document.getElementById("total").innerText="Загальна сума: "+total+" грн";
}

function generateReceipt(){
    const car=cars[carSelect.value];
    if(!car) return;

    let total=0;
    let selected=[];
    const items=document.getElementById("receiptItems");
    items.innerHTML="";

    document.querySelectorAll("input[type=checkbox]:checked")
    .forEach(el=>{
        const name=el.dataset.name;
        const price=Number(el.value);
        total+=price;
        selected.push(`${name} - ${price} грн`);
        items.innerHTML+=`<div class="receipt-item"><span>${name}</span><span>${price} грн</span></div>`;
    });

    if(selected.length===0) return;

    const date=new Date().toLocaleString();
    car.history.push({date,services:selected,total});
    saveCars();

    document.getElementById("receiptCar").innerHTML=
    `<div class="receipt-item"><strong>Авто:</strong> ${car.number} - ${car.model}</div>`;
    document.getElementById("receiptTotal").innerText="Разом: "+total+" грн";
    document.getElementById("receiptDate").innerText="Дата: "+date;

    receiptModal.style.display="flex";
}

function closeReceipt(){ receiptModal.style.display="none"; }

function openHistory(){
    const select=document.getElementById("historyCarSelect");
    select.innerHTML="";
    cars.forEach((car,i)=>{
        select.innerHTML+=`<option value="${i}">
        ${car.number} - ${car.model}
        </option>`;
    });
    renderHistory();
    historyModal.style.display="flex";
}

function renderHistory(){
    const index=document.getElementById("historyCarSelect").value;
    const car=cars[index];
    historyContent.innerHTML="";
    if(!car||!car.history||car.history.length===0){
        historyContent.innerHTML="Історія пуста";
        return;
    }
    car.history.forEach(h=>{
        historyContent.innerHTML+=`
        <div style="margin-bottom:15px;">
        <strong>${h.date}</strong><br>
        ${h.services.join("<br>")}
        <br><strong>Разом: ${h.total} грн</strong>
        </div>`;
    });
}

function closeHistory(){ historyModal.style.display="none"; }
</script>

</body>
</html>
