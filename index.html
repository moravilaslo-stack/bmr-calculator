<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMR ATELIER</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #111, #1a1a1a, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* 🔥 Анімація вправо */
@keyframes bmwMoveRight {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
}

/* Кнопка історії в кутку */
.history-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px 18px;
    border-radius: 30px;
    border: none;
    font-weight: bold;
    color: white;
    cursor: pointer;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 4s linear infinite;
}

.card {
    background: rgba(15, 15, 15, 0.95);
    padding: 30px;
    border-radius: 20px;
    width: 400px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    color: white;
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 6s linear infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.3s;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 4s linear infinite;
}

button:hover { transform: scale(1.05); }

input[type="text"], input[type="number"], select {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    border-radius: 8px;
    border: none;
}

.service {
    display: flex;
    align-items: center;
    margin: 10px 0;
}

.service input[type="checkbox"] { display: none; }

.custom-checkbox {
    width: 22px;
    height: 22px;
    border: 2px solid #1C69D4;
    border-radius: 6px;
    margin-right: 10px;
    position: relative;
    cursor: pointer;
}

.service input[type="checkbox"]:checked + .custom-checkbox {
    background: linear-gradient(45deg,#5BC2E7,#1C69D4,#E10600);
    border: none;
}

.service input[type="checkbox"]:checked + .custom-checkbox::after {
    content: "✔";
    position: absolute;
    top: -2px;
    left: 4px;
    color: white;
    font-size: 16px;
}

.total {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
    background: linear-gradient(90deg,#5BC2E7,#1C69D4,#E10600,#5BC2E7);
    background-size: 300% 100%;
    animation: bmwMoveRight 6s linear infinite;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    overflow-y: auto;
}

.receipt {
    background: #111;
    padding: 25px;
    border-radius: 15px;
    width: 340px;
    box-shadow: 0 0 25px rgba(28,105,212,0.5);
    color: white;
}

.receipt-item {
    margin: 6px 0;
    font-size: 14px;
}

.history-entry {
    border-bottom: 1px solid #333;
    padding: 8px 0;
    font-size: 13px;
}

.hidden { display: none; }

</style>
</head>
<body>

<button class="history-btn" onclick="openHistory()">Історія авто</button>

<div class="card">

<div id="page1">
<h2>BMR ATELIER</h2>
<label>Оберіть автомобіль:</label>
<select id="carSelect"></select>

<h3 style="margin-top:15px;color:#aaa;">Додати новий автомобіль</h3>
<input type="text" id="newCarNumber" placeholder="Номер авто">
<input type="text" id="newCarVin" placeholder="VIN">
<input type="text" id="newCarModel" placeholder="Модель авто">
<button onclick="addCar()">Додати автомобіль</button>
<button onclick="goToPage2()">Далі → Вибір послуг</button>
</div>

<div id="page2" class="hidden">
<h2>BMR ATELIER</h2>
<div id="services"></div>
<button onclick="generateReceipt()">Згенерувати чек</button>
<div class="total" id="total">Загальна сума: 0 грн</div>
<button onclick="goToPage1()">← Назад до авто</button>
</div>

</div>

<!-- Модальне вікно історії -->
<div class="modal" id="historyModal">
    <div class="receipt">
        <h3>Історія обслуговування</h3>
        <div id="historyContent"></div>
        <button onclick="closeHistory()">Закрити</button>
    </div>
</div>

<script>
let cars = JSON.parse(localStorage.getItem("cars")) || [];

function saveCars() {
    localStorage.setItem("cars", JSON.stringify(cars));
}

const carSelect = document.getElementById("carSelect");

function renderCars() {
    carSelect.innerHTML = "";
    cars.forEach((car, i) => {
        if (!car.history) car.history = [];
        carSelect.innerHTML += `<option value="${i}">${car.number} - ${car.model}</option>`;
    });
}
renderCars();

function addCar() {
    const number = newCarNumber.value.trim();
    const vin = newCarVin.value.trim();
    const model = newCarModel.value.trim();
    if (!number || !model) return alert("Введіть номер і модель авто!");
    cars.push({ number, vin, model, history: [] });
    saveCars();
    renderCars();
    newCarNumber.value = newCarVin.value = newCarModel.value = "";
}

function goToPage2() {
    if (cars.length === 0) return alert("Додайте авто!");
    page1.classList.add("hidden");
    page2.classList.remove("hidden");
}

function goToPage1() {
    page2.classList.add("hidden");
    page1.classList.remove("hidden");
}

let services = {
    "Заміна масла": 800,
    "Заміна гальмівних колодок": 1200,
    "Діагностика двигуна": 1500
};

function renderServices() {
    servicesDiv = document.getElementById("services");
    servicesDiv.innerHTML = "";
    for (let s in services) {
        servicesDiv.innerHTML += `
        <label class="service">
            <input type="checkbox" value="${services[s]}" onchange="updateTotal()">
            <span class="custom-checkbox"></span>
            ${s} - ${services[s]} грн
        </label>`;
    }
}
renderServices();

function updateTotal() {
    let total = 0;
    document.querySelectorAll("input[type=checkbox]:checked")
        .forEach(el => total += Number(el.value));
    total.innerText = "Загальна сума: " + total + " грн";
}

function generateReceipt() {
    const car = cars[carSelect.value];
    let selected = [];
    document.querySelectorAll("input[type=checkbox]:checked")
        .forEach(el => selected.push(el.parentElement.innerText));
    if (selected.length === 0) return alert("Оберіть послуги!");

    const entry = {
        date: new Date().toLocaleString(),
        services: selected
    };

    car.history.push(entry);
    saveCars();
    alert("Запис додано в історію!");
}

function openHistory() {
    const car = cars[carSelect.value];
    if (!car) return alert("Оберіть авто!");
    historyContent.innerHTML = "";
    if (car.history.length === 0) {
        historyContent.innerHTML = "Історія пуста";
    } else {
        car.history.forEach(h => {
            historyContent.innerHTML += `
            <div class="history-entry">
                <strong>${h.date}</strong><br>
                ${h.services.join("<br>")}
            </div>`;
        });
    }
    historyModal.style.display = "flex";
}

function closeHistory() {
    historyModal.style.display = "none";
}
</script>

</body>
</html>
